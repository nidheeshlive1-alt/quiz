<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSC Degree Level Mocktest 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+Malayalam:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #161d2e;
    --border: #1e2d4a;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --correct: #10b981;
    --wrong: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --gold: #f59e0b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', 'Noto Sans Malayalam', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(0,212,255,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(124,58,237,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.3);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 2px;
    margin-bottom: 16px;
  }

  .header h1 {
    font-size: clamp(24px, 5vw, 42px);
    font-weight: 700;
    letter-spacing: 1px;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header p {
    color: var(--muted);
    margin-top: 8px;
    font-size: 14px;
    letter-spacing: 1px;
  }

  /* STATS BAR */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px;
    text-align: center;
  }

  .stat-card .label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .stat-card .value {
    font-size: 22px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-card.correct .value { color: var(--correct); }
  .stat-card.wrong .value { color: var(--wrong); }
  .stat-card.score .value { color: var(--gold); }
  .stat-card.total .value { color: var(--accent); }

  /* PROGRESS */
  .progress-bar-wrap {
    background: var(--border);
    height: 3px;
    border-radius: 99px;
    margin-bottom: 32px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 20px;
    overflow: hidden;
    transition: all 0.3s ease;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 20px 22px 16px;
    border-bottom: 1px solid var(--border);
  }

  .q-num {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 13px;
    min-width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .q-text {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.65;
    color: #cbd5e1;
  }

  .options-list {
    padding: 16px 22px 20px;
    display: flex;
    flex-direction: column;
    gap: 9px;
  }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
    color: var(--text);
    font-family: 'Rajdhani', 'Noto Sans Malayalam', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    width: 100%;
  }

  .option-btn:hover:not(:disabled) {
    background: rgba(0,212,255,0.07);
    border-color: rgba(0,212,255,0.3);
    transform: translateX(4px);
  }

  .opt-letter {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 12px;
    color: var(--muted);
    min-width: 22px;
    height: 22px;
    border: 1px solid var(--border);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.2s;
  }

  .option-btn.correct {
    background: rgba(16,185,129,0.12);
    border-color: var(--correct);
  }
  .option-btn.correct .opt-letter {
    background: var(--correct);
    color: #fff;
    border-color: var(--correct);
  }

  .option-btn.wrong {
    background: rgba(239,68,68,0.1);
    border-color: var(--wrong);
  }
  .option-btn.wrong .opt-letter {
    background: var(--wrong);
    color: #fff;
    border-color: var(--wrong);
  }

  .option-btn.selected-correct {
    background: rgba(16,185,129,0.15);
    border-color: var(--correct);
    box-shadow: 0 0 12px rgba(16,185,129,0.2);
  }
  .option-btn.selected-correct .opt-letter {
    background: var(--correct);
    color: #fff;
    border-color: var(--correct);
  }

  .option-btn:disabled { cursor: default; }

  .result-tag {
    margin-left: auto;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 32px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 11px 24px;
    border: none;
    border-radius: 4px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,212,255,0.3); }

  .btn-secondary {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .btn-danger {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.3);
    color: var(--wrong);
  }
  .btn-danger:hover { background: rgba(239,68,68,0.25); }

  .page-info {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--muted);
  }

  /* RESULT SCREEN */
  .result-screen {
    text-align: center;
    padding: 60px 24px;
    animation: slideIn 0.4s ease;
  }

  .result-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) 0%, var(--accent) var(--pct), var(--border) var(--pct));
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
    position: relative;
  }

  .result-circle-inner {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: var(--card);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .result-pct {
    font-size: 30px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }

  .result-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; }

  .result-screen h2 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .result-screen p { color: var(--muted); margin-bottom: 32px; }

  .result-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 480px;
    margin: 0 auto 36px;
  }

  .result-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
  }

  .result-item .ri-val {
    font-size: 28px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 4px;
  }

  .result-item .ri-lab { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

  /* MODE SELECTOR */
  .mode-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }

  .mode-btn {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: transparent;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .mode-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,212,255,0.08);
  }

  /* FILTER */
  .filter-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .filter-row label { font-size: 13px; color: var(--muted); letter-spacing: 1px; }

  select {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 3px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    cursor: pointer;
  }

  select:focus { outline: none; border-color: var(--accent); }

  /* ANSWERED BADGE */
  .answered-badge {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--correct);
    margin-left: 8px;
    vertical-align: middle;
  }

  @media (max-width: 600px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .result-grid { grid-template-columns: repeat(3, 1fr); }
    .controls { flex-direction: column; align-items: stretch; }
    .btn { text-align: center; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-badge">⚡ Kerala PSC</div>
    <h1>Degree Level Mocktest 2026</h1>
    <p>100 Questions · General Knowledge · English · Malayalam · Mathematics</p>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-card total">
      <div class="label">Total</div>
      <div class="value" id="stat-total">100</div>
    </div>
    <div class="stat-card correct">
      <div class="label">Correct</div>
      <div class="value" id="stat-correct">0</div>
    </div>
    <div class="stat-card wrong">
      <div class="label">Wrong</div>
      <div class="value" id="stat-wrong">0</div>
    </div>
    <div class="stat-card score">
      <div class="label">Score %</div>
      <div class="value" id="stat-score">0%</div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <!-- MODE -->
  <div class="mode-bar">
    <button class="mode-btn active" onclick="setMode('quiz')" id="mode-quiz">Quiz Mode</button>
    <button class="mode-btn" onclick="setMode('study')" id="mode-study">Study Mode</button>
  </div>

  <!-- FILTER -->
  <div class="filter-row">
    <label>FILTER:</label>
    <select id="filter-select" onchange="applyFilter()">
      <option value="all">All Questions</option>
      <option value="unanswered">Unanswered</option>
      <option value="correct">Correct</option>
      <option value="wrong">Wrong</option>
    </select>
    <label style="margin-left:auto;">PAGE:</label>
    <select id="page-size" onchange="applyFilter()">
      <option value="5">5 per page</option>
      <option value="10" selected>10 per page</option>
      <option value="25">25 per page</option>
      <option value="100">All</option>
    </select>
  </div>

  <!-- QUESTIONS -->
  <div id="questions-container"></div>

  <!-- CONTROLS -->
  <div class="controls" id="controls">
    <button class="btn btn-secondary" id="btn-prev" onclick="changePage(-1)">← Prev</button>
    <span class="page-info" id="page-info"></span>
    <button class="btn btn-primary" id="btn-next" onclick="changePage(1)">Next →</button>
  </div>

  <div style="margin-top:24px; text-align:center; display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
    <button class="btn btn-secondary" onclick="showResult()">📊 View Result</button>
    <button class="btn btn-danger" onclick="resetQuiz()">↺ Reset Quiz</button>
  </div>

</div>

<script>
const questions = [
  {
    q: "ശരിയായ പ്രസ്താവനകൾ ഏതെല്ലാം?\n(i) കമ്പോളവിലയിലെ അറ്റ ദേശീയ ഉത്പന്നവും വിദേശത്തു നിന്നുള്ള കറന്റ് ട്രാൻസ്ഫറുകളും ചേരുന്നതാണ് ദേശീയ വിനിയോഗ വരുമാനം\n(ii) സമ്മാനങ്ങൾ, സാമ്പത്തിക സഹായങ്ങൾ തുടങ്ങിയവയാണ് വിദേശത്തു നിന്നുള്ള കറന്റ് ട്രാൻസ്ഫറിൽ ഉൾപ്പെടുന്നത്\n(iii) ആഭ്യന്തര സമ്പദ്ഘടനയുടെ പരമാവധി സാധനസേവനങ്ങളുടെ അളവിനെപ്പറ്റി ധാരണ നൽകുന്ന ആശയമാണ് ദേശീയ വിനിയോഗ വരുമാനം",
    options: ["(i) & (ii)", "(ii) & (iii)", "(i), (ii), (iii)", "(i) & (iii)"],
    answer: 2
  },
  {
    q: "1792-ൽ ഒപ്പിട്ട ശ്രീരംഗപട്ടണം സന്ധിയിലൂടെ ബ്രിട്ടീഷുകാർക്ക് ലഭിച്ച പ്രദേശമേത്?",
    options: ["കോയമ്പത്തൂർ", "മലബാർ", "കൊച്ചി", "തിരുവിതാംകൂർ"],
    answer: 1
  },
  {
    q: "ഒരു സമാന്തര പ്രോഗ്രഷനിലെ 25-ാം പദം 40-ഉം 40-ാം പദം 25-ഉം ആയാൽ പൊതു വ്യത്യാസം എത്രയാണ്?",
    options: ["–5", "–1", "1", "ഇവയൊന്നുമല്ല"],
    answer: 1
  },
  {
    q: "കേന്ദ്ര ചീഫ് ഇൻഫർമേഷൻ കമ്മിഷണറെയും, ഇൻഫർമേഷൻ കമ്മിഷണർമാരെയും ശുപാർശചെയ്യാനുള്ള കമ്മിറ്റിയിൽ ഉൾപ്പെടാത്തത് ആര്?",
    options: ["പ്രധാനമന്ത്രി", "ലോക്സഭയിലെ പ്രതിപക്ഷനേതാവ്", "സുപ്രീം കോടതി ചീഫ് ജസ്റ്റിസ്", "പ്രധാനമന്ത്രി നാമനിർദേശം ചെയ്യുന്ന കേന്ദ്രമന്ത്രി"],
    answer: 2
  },
  {
    q: "ഒരു വരിയിൽ ഹരിതയുടെ സ്ഥാനം മുന്നിൽ നിന്നും 14-ാമതും പിന്നിൽ നിന്നും 16-ാമതും ആണ്. വരിയിൽ ആകെ എത്ര പേർ ഉണ്ട്?",
    options: ["28", "29", "30", "31"],
    answer: 1
  },
  {
    q: "ശരിയായ വിവരങ്ങളേവ?\n(i) 2025 ജനുവരിയിലാണ് കേന്ദ്രസർക്കാർ, നാഷണൽ ക്രിട്ടിക്കൽ മിനറൽ മിഷൻ അംഗീകരിച്ചത്\n(ii) നാഷണൽ ക്രിട്ടിക്കൽ മിനറൽ മിഷന്റെ അടങ്കൽ തുക 16,300 കോടി രൂപയാണ്\n(iii) മിഷൻ ലക്ഷ്യമിടുന്ന ക്രിട്ടിക്കൽ മിനറലുകൾ 24 എണ്ണമാണ്\n(iv) ക്രിട്ടിക്കൽ മിനറലുകൾക്ക് ഉദാഹരണങ്ങളാണ് ഇരുമ്പ്, ചെമ്പ്, സിങ്ക് എന്നിവ",
    options: ["(i), (ii), (iii)", "(ii), (iii), (iv)", "(i), (ii), (iii), (iv)", "(i), (iii), (iv)"],
    answer: 0
  },
  {
    q: "ഐഹികം എന്നതിന്റെ വിപരീതപദമാണ്?",
    options: ["സാർവത്രികം", "പാരത്രികം", "ഭൗതികം", "പരാങ്മുഖം"],
    answer: 1
  },

    q: "നാഷണൽ ബുക് ട്രസ്റ്റ് ഓഫ് ഇന്ത്യയുടെ പ്രവർത്തനങ്ങളിൽ ഉൾപ്പെടാത്തത് ഏത്?",
    options: ["കുറഞ്ഞ ചെലവിൽ പുസ്തകങ്ങൾ പ്രസിദ്ധീകരിക്കുക", "വായന വളർത്തുക", "ഇന്ത്യൻ പുസ്തകങ്ങൾ സ്വദേശത്തും വിദേശത്തും പ്രോത്സാഹിപ്പിക്കുക", "ഇന്ത്യൻ ഭാഷാ സാഹിത്യത്തിന്റെ ഉന്നമനം"],
    answer: 3
  }
];

// State
let userAnswers = new Array(100).fill(null);
let mode = 'quiz'; // quiz or study
let currentPage = 0;
let pageSize = 10;
let filteredIndices = questions.map((_, i) => i);

function setMode(m) {
  mode = m;
  document.getElementById('mode-quiz').classList.toggle('active', m === 'quiz');
  document.getElementById('mode-study').classList.toggle('active', m === 'study');
  renderPage();
}

function applyFilter() {
  const filter = document.getElementById('filter-select').value;
  pageSize = parseInt(document.getElementById('page-size').value);
  if (filter === 'all') filteredIndices = questions.map((_, i) => i);
  else if (filter === 'unanswered') filteredIndices = questions.map((_, i) => i).filter(i => userAnswers[i] === null);
  else if (filter === 'correct') filteredIndices = questions.map((_, i) => i).filter(i => userAnswers[i] === questions[i].answer);
  else if (filter === 'wrong') filteredIndices = questions.map((_, i) => i).filter(i => userAnswers[i] !== null && userAnswers[i] !== questions[i].answer);
  currentPage = 0;
  renderPage();
}

function renderPage() {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  const start = currentPage * pageSize;
  const end = Math.min(start + pageSize, filteredIndices.length);
  const pageIndices = filteredIndices.slice(start, end);
  const letters = ['A', 'B', 'C', 'D'];

  pageIndices.forEach(qi => {
    const q = questions[qi];
    const answered = userAnswers[qi] !== null;
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `q-${qi}`;

    const qText = q.q.replace(/\n/g, '<br>');
    card.innerHTML = `
      <div class="question-header">
        <div class="q-num">${qi + 1}</div>
        <div class="q-text">${qText}${answered ? '<span class="answered-badge"></span>' : ''}</div>
      </div>
      <div class="options-list" id="opts-${qi}"></div>
    `;

    const optsList = card.querySelector(`#opts-${qi}`);
    q.options.forEach((opt, oi) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';

      let cls = '';
      if (mode === 'study') {
        if (oi === q.answer) cls = 'correct';
      } else if (answered) {
        if (oi === q.answer && userAnswers[qi] === oi) cls = 'selected-correct';
        else if (oi === q.answer) cls = 'correct';
        else if (oi === userAnswers[qi]) cls = 'wrong';
      }

      btn.className = `option-btn ${cls}`;
      if (answered || mode === 'study') btn.disabled = true;

      const resultTag = answered || mode === 'study' ? 
        (oi === q.answer ? '<span class="result-tag" style="color:var(--correct)">✓</span>' : 
         (oi === userAnswers[qi] && oi !== q.answer ? '<span class="result-tag" style="color:var(--wrong)">✗</span>' : '')) : '';

      btn.innerHTML = `<span class="opt-letter">${letters[oi]}</span><span style="flex:1">${opt}</span>${resultTag}`;

      if (!answered && mode !== 'study') {
        btn.onclick = () => selectAnswer(qi, oi);
      }
      optsList.appendChild(btn);
    });

    container.appendChild(card);
  });

  updateUI();
}

function selectAnswer(qi, oi) {
  userAnswers[qi] = oi;
  updateStats();
  renderPage();
}

function updateStats() {
  let correct = 0, wrong = 0, answered = 0;
  userAnswers.forEach((ans, i) => {
    if (ans !== null) {
      answered++;
      if (ans === questions[i].answer) correct++;
      else wrong++;
    }
  });
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
  const pct = answered > 0 ? Math.round((correct / answered) * 100) : 0;
  document.getElementById('stat-score').textContent = pct + '%';
  const progPct = Math.round((answered / questions.length) * 100);
  document.getElementById('progress-fill').style.width = progPct + '%';
}

function updateUI() {
  const totalPages = Math.ceil(filteredIndices.length / pageSize);
  document.getElementById('page-info').textContent = `Page ${currentPage + 1} / ${totalPages || 1}  •  ${filteredIndices.length} questions`;
  document.getElementById('btn-prev').style.opacity = currentPage === 0 ? '0.4' : '1';
  document.getElementById('btn-next').style.opacity = currentPage >= totalPages - 1 ? '0.4' : '1';
}

function changePage(dir) {
  const totalPages = Math.ceil(filteredIndices.length / pageSize);
  currentPage = Math.max(0, Math.min(totalPages - 1, currentPage + dir));
  renderPage();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showResult() {
  let correct = 0, wrong = 0, unanswered = 0;
  userAnswers.forEach((ans, i) => {
    if (ans === null) unanswered++;
    else if (ans === questions[i].answer) correct++;
    else wrong++;
  });
  const pct = Math.round((correct / questions.length) * 100);
  const grade = pct >= 80 ? '🏆 Excellent!' : pct >= 60 ? '✅ Good Job!' : pct >= 40 ? '📚 Keep Practicing' : '💪 Keep Going!';

  const container = document.getElementById('questions-container');
  container.innerHTML = `
    <div class="result-screen">
      <div class="result-circle" style="--pct: ${pct}%">
        <div class="result-circle-inner">
          <div class="result-pct">${pct}%</div>
          <div class="result-label">SCORE</div>
        </div>
      </div>
      <h2>${grade}</h2>
      <p>PSC Degree Level Mocktest 2026 Results</p>
      <div class="result-grid">
        <div class="result-item">
          <div class="ri-val" style="color:var(--correct)">${correct}</div>
          <div class="ri-lab">Correct</div>
        </div>
        <div class="result-item">
          <div class="ri-val" style="color:var(--wrong)">${wrong}</div>
          <div class="ri-lab">Wrong</div>
        </div>
        <div class="result-item">
          <div class="ri-val" style="color:var(--muted)">${unanswered}</div>
          <div class="ri-lab">Skipped</div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="applyFilter(); updateStats();">← Back to Questions</button>
    </div>
  `;
  document.getElementById('controls').style.display = 'none';
}

function resetQuiz() {
  if (!confirm('Reset all answers?')) return;
  userAnswers = new Array(100).fill(null);
  currentPage = 0;
  document.getElementById('filter-select').value = 'all';
  applyFilter();
  updateStats();
  document.getElementById('controls').style.display = '';
}

// Init
applyFilter();
updateStats();
</script>
</body>
</html>
